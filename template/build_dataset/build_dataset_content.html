<!-- ============ MAIN CONTENT ============ -->
<main class="container main-content">

  <!-- ---------- Dataset Source Card ---------- -->
<form method="post">
  {% csrf_token %}
  <section class="card">
    <label class="field-label" for="doc-urls">Documentation URLs</label>
    <textarea
      id="doc-urls"
      name="doc_urls"
      class="url-textarea"
      rows="6"
      placeholder="https://docs.python.org
      https://fastapi.tiangolo.com
      https://docs.djangoproject.com"></textarea>
    <p class="helper-text">Enter one documentation URL per line.</p>
  </section>

  <!-- ---------- Dataset Settings Card ---------- -->
  <section class="card">
    <h2 class="card-title">Dataset Settings</h2>
    <div class="settings-grid">
      <div class="field-group">
        <label class="field-label" for="chunk-size">Chunk Size</label>
        <input type="number" id="chunk-size" name="chunk_size" class="text-input" value="200">
      </div>
      <div class="field-group">
        <label class="field-label" for="top-k">Top K Retrieval</label>
        <input type="number" id="top-k" name="top_k" class="text-input" value="5">
      </div>
    </div>
  </section>

  <!-- ---------- Build Button ---------- -->
  <div class="build-button-wrapper">
    <button type="submit" class="build-button">Build Dataset</button>
  </div>
</form>
  {% if success %}
    <p>{{message}}</p>
  {%else%}
    <p>{{error}}</p>
  {% endif %}
