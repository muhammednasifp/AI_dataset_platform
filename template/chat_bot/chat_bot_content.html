<section class="hero">
  <div class="container">
    <h1>Ask Questions</h1>
    <p class="lead">Ask questions about your generated knowledge base using Retrieval-Augmented Generation (RAG).</p>
  </div>
</section>

<!-- ============ MAIN CONTENT ============ -->
<main class="container main-content">

  <!-- ---------- Question Card ---------- -->
   <form method="post">
    {% csrf_token %}
  <section class="card">
    <label class="field-label" for="user-question">Your Question</label>
    <textarea
      id="user-question"
      name="question"
      class="question-textarea"
      rows="5"
      placeholder="question">{{question|default:'' }}</textarea>
    <p class="helper-text">Ask questions related to the generated dataset.</p>
  </section>

  <!-- ---------- Ask Button ---------- -->
  <div class="ask-button-wrapper">
    <button type="submit" class="ask-button">Ask Question</button>
  </div>

  </form>
  <!-- ---------- Answer Card ---------- -->
  <section class="card answer-card">
    <h2 class="card-title">Answer</h2>
    <div class="answer-body">
      {%if success%}
        {{answer}}
      {% else %}
        {{error}}
      {% endif %}
     
    </div>
  </section>
